apiVersion: apps/v1
kind: Deployment
metadata:
  name: retry-worker
  namespace: workers
spec:
  replicas: 0   # KEDA controls replicas
  selector:
    matchLabels:
      app: retry-worker
  template:
    metadata:
      labels:
        app: retry-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: retry-worker-sa
      containers:
        - name: retry-worker
          # TODO: pin to a specific tag/digest e.g. jukpozi/retry-worker:1.0.0
          image: jukpozi/retry-worker:latest
          imagePullPolicy: Always

          env:
            - name: NERVE_CENTER_URL
              value: "http://nerve-center.core.svc.cluster.local:8080"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Workers are background Service Bus consumers — no HTTP port to probe.
          # Kubernetes will restart the container automatically on crash (default
          # restartPolicy: Always). Add a livenessProbe here if your worker
          # exposes a /healthz endpoint or writes a liveness file.
