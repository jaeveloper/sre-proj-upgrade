apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processor
  namespace: workers
spec:
  replicas: 0   # IMPORTANT: KEDA controls replicas
  selector:
    matchLabels:
      app: order-processor
  template:
    metadata:
      labels:
        app: order-processor
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: order-processor-sa
      containers:
        - name: order-processor
          # TODO: pin to a specific tag/digest e.g. jukpozi/order-processor:1.0.0
          image: jukpozi/order-processor:latest
          imagePullPolicy: Always

          env:
            - name: NERVE_CENTER_URL
              value: "http://nerve-center.core.svc.cluster.local:8080"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Workers are background Service Bus consumers — no HTTP port to probe.
          # Kubernetes will restart the container automatically on crash (default
          # restartPolicy: Always). Add a livenessProbe here if your worker
          # exposes a /healthz endpoint or writes a liveness file.
