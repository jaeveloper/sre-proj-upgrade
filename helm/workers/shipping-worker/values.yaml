name: shipping-worker
namespace: workers

image:
  repository: jukpozi/shippingservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: shipping-worker-sa
  clientId: "7cd1ff0c-20cd-45b0-acee-5e9f70760afa"

env:
  - name: SHIPPINGSERVICE_URL
    value: "http://shippingservice.core.svc.cluster.local:50051"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: shippingservice-sub
  messageCount: "5"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 10
