name: shipping-worker
namespace: workers

image:
  repository: jukpozi/shippingservice
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: shippingservice-worker-sa
  clientId: "7cd1ff0c-20cd-45b0-acee-5e9f70760afa"

env:
  - name: WORKER_MODE
    value: "true"
  - name: SERVICEBUS_NAMESPACE
    value: "sre-sb-namespace"
  - name: SERVICEBUS_TOPIC
    value: "checkout-events"
  - name: SERVICEBUS_SUBSCRIPTION
    value: "shipping"
  - name: DISABLE_PROFILER
    value: "1"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector.observability.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "shipping-worker"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: checkout-events
  subscriptionName: shipping
  messageCount: "1"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 10
