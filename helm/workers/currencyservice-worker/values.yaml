name: currencyservice-worker
namespace: workers

image:
  repository: jukpozi/currencyservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: currencyservice-worker-sa
  clientId: "c9fdfd19-1c8d-493b-b143-4d625f2fbb5b"

env:
  - name: CURRENCYSERVICE_URL
    value: "http://currencyservice.core.svc.cluster.local:7000"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: currencyservice-sub
  messageCount: "5"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 8
