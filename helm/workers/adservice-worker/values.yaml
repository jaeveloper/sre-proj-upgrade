name: adservice-worker
namespace: workers

image:
  repository: jukpozi/adservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: adservice-worker-sa
  clientId: "<MANAGED_IDENTITY_CLIENT_ID>"

env:
  - name: ADSERVICE_URL
    value: "http://adservice.core.svc.cluster.local:9555"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: adservice-sub
  messageCount: "10"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 8
