name: productcatalogservice-worker
namespace: workers

image:
  repository: jukpozi/productcatalogservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: productcatalogservice-worker-sa
  clientId: "98224623-cf71-439e-b480-d726de30d10e"

env:
  - name: PRODUCTCATALOGSERVICE_URL
    value: "http://productcatalogservice.core.svc.cluster.local:3550"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: catalogservice-sub
  messageCount: "5"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 5
