name: emailservice-worker
namespace: workers

image:
  repository: jukpozi/emailservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: emailservice-worker-sa
  clientId: "<MANAGED_IDENTITY_CLIENT_ID>"

env:
  - name: EMAILSERVICE_URL
    value: "http://emailservice.core.svc.cluster.local:8080"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: emailservice-sub
  messageCount: "5"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 8
