name: checkoutservice-worker
namespace: workers

image:
  repository: jukpozi/checkoutservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: checkoutservice-worker-sa
  clientId: "0744a964-44cb-470d-976c-0251afd3db83"

env:
  - name: CHECKOUTSERVICE_URL
    value: "http://checkoutservice.core.svc.cluster.local:5050"

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: checkoutservice-sub
  messageCount: "3"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 15
