apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Values.name }}-scaledobject
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    name: {{ .Values.name }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.keda.maxReplicaCount }}
  triggers:
    - type: azure-servicebus
      metadata:
        namespace: {{ .Values.keda.serviceBusNamespace }}
        topicName: {{ .Values.keda.topicName }}
        subscriptionName: {{ .Values.keda.subscriptionName }}
        messageCount: {{ .Values.keda.messageCount | quote }}
      authenticationRef:
        name: {{ .Values.name }}-trigger-auth
