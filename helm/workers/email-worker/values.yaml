name: email-worker
namespace: workers

image:
  repository: jukpozi/emailservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: email-worker-sa
  clientId: "5128d644-0463-4e9d-bad8-fa2d26882f89"

env:
  - name: EMAILSERVICE_URL
    value: "http://emailservice.core.svc.cluster.local:8080"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: checkout-events
  subscriptionName: email
  messageCount: "5"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 8
