name: paymentservice-worker
namespace: workers

image:
  repository: jukpozi/paymentservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: paymentservice-worker-sa
  clientId: "<MANAGED_IDENTITY_CLIENT_ID>"

env:
  - name: PAYMENTSERVICE_URL
    value: "http://paymentservice.core.svc.cluster.local:50051"

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: paymentservice-sub
  messageCount: "3"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 15
