name: recommendationservice-worker
namespace: workers

image:
  repository: jukpozi/recommendationservice-worker
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: recommendationservice-worker-sa
  clientId: "<MANAGED_IDENTITY_CLIENT_ID>"

env:
  - name: RECOMMENDATIONSERVICE_URL
    value: "http://recommendationservice.core.svc.cluster.local:8080"

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

keda:
  serviceBusNamespace: sre-sb-namespace
  topicName: business-events
  subscriptionName: recommendationservice-sub
  messageCount: "5"
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 5
