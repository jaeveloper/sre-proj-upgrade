name: productcatalogservice
namespace: core

replicaCount: 1

image:
  repository: jukpozi/productcatalogservice
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: productcatalogservice-sa

containerPort: 3550

service:
  type: ClusterIP
  port: 3550

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

env:
  - name: PORT
    value: "3550"
  - name: ENABLE_TRACING
    value: "0"
  - name: ENABLE_PROFILER
    value: "0"
