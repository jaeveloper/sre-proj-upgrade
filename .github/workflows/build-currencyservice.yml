name: Build CurrencyService Image

on:
  push:
    branches: [ main ]
    paths:
      - "services/currencyservice/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: services/currencyservice
        run: npm install

      - name: Run tests
        working-directory: services/currencyservice
        run: npm test
        continue-on-error: true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/currencyservice:latest \
          ./services/currencyservice

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/currencyservice:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/currencyservice:latest
