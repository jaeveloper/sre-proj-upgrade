name: Build CartService Image

on:
  push:
    branches: [ main ]
    paths:
      - "services/cartservice/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: services/cartservice/src
        run: dotnet restore

      - name: Run tests
        working-directory: services/cartservice
        run: dotnet test --no-restore

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/cartservice:latest \
          ./services/cartservice/src

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/cartservice:latest
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cartservice:latest
