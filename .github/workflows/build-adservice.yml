name: Build AdService Image

on:
  push:
    branches: [ main ]
    paths:
      - "services/adservice/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and run tests
        working-directory: services/adservice
        run: |
          chmod +x gradlew
          ./gradlew test

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/adservice:latest \
          ./services/adservice

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/adservice:latest
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/adservice:latest
