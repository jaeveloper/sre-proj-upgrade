name: Build EmailService Image

on:
  push:
    branches: [ main ]
    paths:
      - "services/emailservice/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/emailservice
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/emailservice
        run: pytest

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/emailservice:latest \
          ./services/emailservice

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/emailservice:latest
          format: table
          exit-code: '1'
          severity: CRITICAL

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/emailservice:latest
