name: Build RecommendationService Image

on:
  push:
    branches: [ main ]
    paths:
      - "services/recommendationservice/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: services/recommendationservice
        run: pip install -r requirements.txt pytest

      - name: Run tests
        working-directory: services/recommendationservice
        run: python -m pytest
        continue-on-error: true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/recommendationservice:latest \
          ./services/recommendationservice

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/recommendationservice:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/recommendationservice:latest
