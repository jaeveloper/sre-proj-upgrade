# Redis connection secret for cartservice.
#
# This file is a TEMPLATE — do not commit real access keys to git.
# Apply once manually after provisioning:
#
#   REDIS_KEY=$(terraform -chdir=terraform/environments/dev output -raw redis_primary_key)
#   kubectl create secret generic redis-secret \
#     --namespace core \
#     --from-literal=connectionString="sre-redis-cart.redis.cache.windows.net:6380,ssl=true,abortConnect=false,password=${REDIS_KEY}" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The cartservice Deployment reads this via:
#   env:
#     - name: REDIS_ADDR
#       valueFrom:
#         secretKeyRef:
#           name: redis-secret
#           key: connectionString
#
# Port 6380 is required — non-SSL port 6379 is disabled on sre-redis-cart.
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: core
type: Opaque
stringData:
  connectionString: "REPLACE_BEFORE_APPLYING"
