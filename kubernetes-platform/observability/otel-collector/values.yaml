## OpenTelemetry Collector — pipeline configuration
## Deployed via ArgoCD; see kubernetes-platform/argocd/apps/otel-collector.yaml

mode: deployment

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 10s
      send_batch_size: 1024
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

  exporters:
    # Metrics → Prometheus
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: otel

    # Traces + logs → Azure Application Insights
    azuremonitor:
      connection_string: ${APPLICATIONINSIGHTS_CONNECTION_STRING}

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [azuremonitor]

      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus]

      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [azuremonitor]

# Inject connection string from the ConfigMap
extraEnvs:
  - name: APPLICATIONINSIGHTS_CONNECTION_STRING
    valueFrom:
      configMapKeyRef:
        name: appinsights-config
        key: APPLICATIONINSIGHTS_CONNECTION_STRING

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
