# OTEL Collector
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: observability
  labels:
    release: prometheus   # matches kube-prometheus-stack label selector
spec:
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  endpoints:
    - port: prometheus
      path: /metrics
      interval: 30s

---
# KEDA Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: keda-operator
  namespace: observability
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - keda
  selector:
    matchLabels:
      app.kubernetes.io/name: keda-operator
  endpoints:
    - port: metricsservice
      path: /metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
      interval: 30s

---
# Core microservices (opt-in via label: monitoring: "true")
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: core-services
  namespace: observability
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - core
  selector:
    matchLabels:
      monitoring: "true"
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
