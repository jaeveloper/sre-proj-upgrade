## ServiceMonitor — instructs Prometheus to scrape OTEL Collector metrics
## and any service that exposes a /metrics endpoint in the core namespace.

# ── OTEL Collector ───────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: observability
  labels:
    release: prometheus   # matches kube-prometheus-stack label selector
spec:
  namespaceSelector:
    matchNames:
      - observability
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  endpoints:
    - port: prometheus
      path: /metrics
      interval: 30s

---
# ── KEDA Operator ─────────────────────────────────────────────────────────────
# Exposes keda_scaler_metrics_value (Service Bus message count seen by the scaler)
# and keda_scaled_object_errors, keda_resource_totals, etc.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: keda-operator
  namespace: observability
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - keda
  selector:
    matchLabels:
      app.kubernetes.io/name: keda-operator
  endpoints:
    - port: metricsservice
      path: /metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
      interval: 30s

---
# ── Core microservices (opt-in via label) ────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: core-services
  namespace: observability
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - core
  selector:
    matchLabels:
      monitoring: "true"   # add this label to any Service you want scraped
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
