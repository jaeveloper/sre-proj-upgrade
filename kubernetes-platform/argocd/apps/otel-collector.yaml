apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.91.0
    helm:
      valueFiles:
        - values.yaml
      values: |
        mode: deployment
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          exporters:
            prometheus:
              endpoint: "0.0.0.0:8889"
            azuremonitor:
              connection_string: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
          service:
            pipelines:
              traces:
                receivers: [otlp]
                exporters: [azuremonitor]
              metrics:
                receivers: [otlp]
                exporters: [prometheus]
        extraEnvs:
          - name: APPLICATIONINSIGHTS_CONNECTION_STRING
            valueFrom:
              configMapKeyRef:
                name: appinsights-config
                key: APPLICATIONINSIGHTS_CONNECTION_STRING
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
          prometheus:
            enabled: true
            containerPort: 8889
            servicePort: 8889
            protocol: TCP
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
