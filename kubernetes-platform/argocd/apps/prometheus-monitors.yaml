apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-monitors
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jaeveloper/sre-proj-upgrade
    targetRevision: main
    path: kubernetes-platform/observability/prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
