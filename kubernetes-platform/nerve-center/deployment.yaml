apiVersion: apps/v1
kind: Deployment
metadata:
  name: nerve-center
  namespace: core
spec:
  replicas: 1   # 1 for now - HA control plane
  selector:
    matchLabels:
      app: nerve-center
  template:
    metadata:
      labels:
        app: nerve-center
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: nerve-center-sa
      containers:
        - name: nerve-center
          # TODO: pin to a specific tag/digest once a new image is built
          # e.g. jukpozi/nerve-center:1.2.3 or @sha256:<digest>
          # NOTE: services/nerve-center source was replaced; rebuild image
          # from the new services directory before updating this tag.
          image: jukpozi/nerve-center:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            # No secrets needed anymore
            # Add any app-specific configs here if required

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 4
