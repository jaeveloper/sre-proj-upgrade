apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice-worker
  namespace: workers
spec:
  replicas: 0   # KEDA controls replicas
  selector:
    matchLabels:
      app: adservice-worker
  template:
    metadata:
      labels:
        app: adservice-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: adservice-worker-sa
      containers:
        - name: adservice-worker
          # TODO: pin to a specific tag e.g. jukpozi/adservice-worker:1.0.0
          image: jukpozi/adservice-worker:latest
          imagePullPolicy: Always
          env:
            - name: ADSERVICE_URL
              value: "http://adservice.core.svc.cluster.local:9555"
            - name: NERVE_CENTER_URL
              value: "http://nerve-center.core.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
