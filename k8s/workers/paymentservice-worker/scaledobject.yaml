apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: paymentservice-worker-scaledobject
  namespace: workers
spec:
  scaleTargetRef:
    name: paymentservice-worker
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 15
  triggers:
    - type: azure-servicebus
      metadata:
        namespace: sre-sb-namespace
        topicName: business-events
        subscriptionName: paymentservice-sub
        messageCount: "3"
      authenticationRef:
        name: paymentservice-worker-trigger-auth
