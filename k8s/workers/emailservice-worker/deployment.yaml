apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice-worker
  namespace: workers
spec:
  replicas: 0   # KEDA controls replicas
  selector:
    matchLabels:
      app: emailservice-worker
  template:
    metadata:
      labels:
        app: emailservice-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: emailservice-worker-sa
      containers:
        - name: emailservice-worker
          # TODO: pin to a specific tag e.g. jukpozi/emailservice-worker:1.0.0
          image: jukpozi/emailservice-worker:latest
          imagePullPolicy: Always
          env:
            - name: EMAILSERVICE_URL
              value: "http://emailservice.core.svc.cluster.local:8080"
            - name: NERVE_CENTER_URL
              value: "http://nerve-center.core.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
