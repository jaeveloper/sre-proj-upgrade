apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice-worker
  namespace: workers
spec:
  replicas: 0   # KEDA controls replicas
  selector:
    matchLabels:
      app: shippingservice-worker
  template:
    metadata:
      labels:
        app: shippingservice-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: shippingservice-worker-sa
      containers:
        - name: shippingservice-worker
          # TODO: pin to a specific tag e.g. jukpozi/shippingservice-worker:1.0.0
          image: jukpozi/shippingservice-worker:latest
          imagePullPolicy: Always
          env:
            - name: SHIPPINGSERVICE_URL
              value: "http://shippingservice.core.svc.cluster.local:50051"
            - name: NERVE_CENTER_URL
              value: "http://nerve-center.core.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
