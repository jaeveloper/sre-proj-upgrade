apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice-worker
  namespace: workers
spec:
  replicas: 0   # KEDA controls replicas
  selector:
    matchLabels:
      app: cartservice-worker
  template:
    metadata:
      labels:
        app: cartservice-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: cartservice-worker-sa
      containers:
        - name: cartservice-worker
          # TODO: pin to a specific tag e.g. jukpozi/cartservice-worker:1.0.0
          image: jukpozi/cartservice-worker:latest
          imagePullPolicy: Always
          env:
            - name: CARTSERVICE_URL
              value: "http://cartservice.core.svc.cluster.local:7070"
            - name: NERVE_CENTER_URL
              value: "http://nerve-center.core.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
