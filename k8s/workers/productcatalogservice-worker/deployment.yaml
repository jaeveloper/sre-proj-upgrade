apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice-worker
  namespace: workers
spec:
  replicas: 0   # KEDA controls replicas
  selector:
    matchLabels:
      app: productcatalogservice-worker
  template:
    metadata:
      labels:
        app: productcatalogservice-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: productcatalogservice-worker-sa
      containers:
        - name: productcatalogservice-worker
          # TODO: pin to a specific tag e.g. jukpozi/productcatalogservice-worker:1.0.0
          image: jukpozi/productcatalogservice-worker:latest
          imagePullPolicy: Always
          env:
            - name: PRODUCTCATALOGSERVICE_URL
              value: "http://productcatalogservice.core.svc.cluster.local:3550"
            - name: NERVE_CENTER_URL
              value: "http://nerve-center.core.svc.cluster.local:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
