apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: productcatalogservice-worker-scaledobject
  namespace: workers
spec:
  scaleTargetRef:
    name: productcatalogservice-worker
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
    - type: azure-servicebus
      metadata:
        namespace: sre-sb-namespace
        topicName: business-events
        subscriptionName: catalogservice-sub
        messageCount: "5"
      authenticationRef:
        name: productcatalogservice-worker-trigger-auth
